services:
  # Docmost Web Service
  - type: web
    name: docmost-app
    runtime: docker
    plan: starter # Starter plan is recommended for apps with persistent disks
    envVars:
      - key: APP_URL
        fromService:
          type: web
          name: docmost-app
          property: host
      - key: APP_SECRET
        generate: true
      - key: DATABASE_URL
        fromDatabase:
          name: docmost-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: docmost-redis
          property: connectionString
    disk:
      name: docmost-storage
      mountPath: /app/data/storage
      sizeGB: 20 # Adjust size based on your documentation needs

  # Redis Instance
  - type: redis
    name: docmost-redis
    plan: starter # Starter plan includes persistence; use 'free' if price is a concern
    ipAllowList: [] # default to allow all internally

databases:
  # PostgreSQL Database
  - name: docmost-db
    databaseName: docmost
    user: docmost
    plan: starter # Starter plan for persistence (Free plan expires after 90 days)
