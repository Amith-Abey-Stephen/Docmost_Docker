services:
  # Docmost Web Service (FREE TIER)
  - type: web
    name: docmost-app
    runtime: docker
    plan: free # Switch to free
    envVars:
      - key: APP_URL
        value: https://docmost-94hq.onrender.com 
      - key: APP_SECRET
        generateValue: true 
      - key: DATABASE_URL
        fromDatabase:
          name: docmost-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: docmost-redis
          property: connectionString
    # DISK IS REMOVED because it's not available on the Free plan. 
    # Data will reset on server restarts.

  # Redis Instance (FREE TIER)
  - type: keyvalue
    name: docmost-redis
    plan: free
    ipAllowList: [] 

databases:
  # PostgreSQL Database (FREE TIER)
  - name: docmost-db
    databaseName: docmost
    user: docmost
    plan: free # Free for 90 days on Render
