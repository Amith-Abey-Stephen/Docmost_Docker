services:
  # Docmost Web Service
  - type: web
    name: docmost-app
    runtime: docker
    plan: starter
    envVars:
      - key: APP_URL
        value: https://docmost-94hq.onrender.com
      - key: APP_SECRET
        generate: true
      - key: DATABASE_URL
        fromDatabase:
          name: docmost-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: docmost-redis
          property: connectionString
    disk:
      name: docmost-storage
      mountPath: /app/data/storage
      sizeGB: 10

  # Redis Instance (using the modern keyvalue type)
  - type: keyvalue
    name: docmost-redis
    plan: starter
    ipAllowList: [] 

databases:
  # PostgreSQL Database
  - name: docmost-db
    databaseName: docmost
    user: docmost
    plan: starter
